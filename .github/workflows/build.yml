name: Build genox.sh

on:
  pull_request:
    branches:
      - 'master'
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build & Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Lint genox.sh
        run: shellcheck genox.sh

      - name: Make executable
        run: chmod +x genox.sh

      - name: Verify script runs (help/version flag)
        run: bash genox.sh --help || bash genox.sh -h || true

      - name: Package artifact
        run: |
          mkdir -p dist
          cp genox.sh dist/genox.sh
          chmod +x dist/genox.sh
          tar -czf dist/genox-linux-x86_64.tar.gz -C dist genox.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: genox-linux-x86_64
          path: dist/genox-linux-x86_64.tar.gz
          retention-days: 30

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make executable & package
        run: |
          chmod +x genox.sh
          mkdir -p dist
          cp genox.sh dist/genox.sh
          tar -czf dist/genox-linux-x86_64.tar.gz -C dist genox.sh

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/genox-linux-x86_64.tar.gz
          generate_release_notes: true

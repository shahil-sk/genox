  <!-- Large G lettermark — outer arc (open arc via path) -->
  <!-- G shape: big circular arc open on right, with horizontal crossbar -->
  <path d="&#10;    M 430 262&#10;    A 142 142 0 1 0 430 418&#10;  " fill="none" stroke="#5b8dee" stroke-width="44" stroke-linecap="round" style="fill:none;stroke:rgb(91, 141, 238);color:rgb(255, 255, 255);stroke-width:44px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

